# fifos.dev — nginx server block.
#
# Drop into /etc/nginx/sites-available/fifos.dev (then symlink into
# sites-enabled), or into /etc/nginx/conf.d/fifos.conf. NOT a full nginx.conf —
# this assumes the system-level http {} block is already configured (gzip,
# log_format, sensible defaults, etc).
#
# Fifos uses Server-Sent Events for live updates (`/w/:ulid/items` per-fifo
# stream and `/f/fifos/items` per-user stream). SSE breaks under nginx's default
# proxy settings: it buffers responses, which delays event delivery
# indefinitely, and the default 60s `proxy_read_timeout` will silently drop the
# connection between heartbeats. Both are fixed below.
#
# Required:
#   - Bun process listening on 127.0.0.1:3000 (set FIFOS_DOMAIN=https://fifos.dev
#     in the service env so the app generates correct webhook URLs).
#   - TLS cert at the certbot Let's Encrypt path (adjust if you use another CA).
#   - DNS A/AAAA pointing fifos.dev (and www) at this server.

# Redirect HTTP → HTTPS, and serve ACME challenges in the clear.
server {
  listen 80;
  listen [::]:80;
  server_name fifos.dev www.fifos.dev;

  # Let's Encrypt webroot (run certbot with --webroot -w /var/www/certbot).
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://fifos.dev$request_uri;
  }
}

# Optional: redirect www → apex on HTTPS too.
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name www.fifos.dev;

  ssl_certificate     /etc/letsencrypt/live/fifos.dev/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/fifos.dev/privkey.pem;

  return 301 https://fifos.dev$request_uri;
}

# Main site.
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name fifos.dev;

  ssl_certificate     /etc/letsencrypt/live/fifos.dev/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/fifos.dev/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;

  # Item bodies are capped at 64 KB by the API; reason bodies at 1 KiB.
  # Allow some slack for headers and idempotency keys.
  client_max_body_size 128k;

  # Security headers. CSP intentionally permissive — the SPA is fully self-hosted
  # but tighten if you add third-party scripts.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "DENY" always;

  # SSE endpoints — must NOT buffer, must NOT compress, must allow long reads.
  # The Bun app sends `: keep-alive\n\n` every 25s on these streams, so a
  # 5-minute read timeout is plenty of headroom.
  location ~ ^/(w/[^/]+/items|f/fifos/items)$ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # Critical for SSE.
    proxy_buffering        off;
    proxy_cache            off;
    proxy_read_timeout     1h;
    proxy_send_timeout     1h;
    gzip                   off;
    chunked_transfer_encoding on;

    # Tell upstream proxies (e.g. Cloudflare) not to buffer either.
    add_header X-Accel-Buffering "no" always;
  }

  # Everything else — normal reverse proxy.
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # Normal request timeouts. Webhook writes should finish within seconds.
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }
}
